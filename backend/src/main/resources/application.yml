spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ehr
    username: ehr
    password: ehr
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

fhir:
  server:
    url: ${FHIR_SERVER_URL:http://localhost:8092/fhir}

server:
  port: ${SERVER_PORT:8091}
  error:
    include-message: always
    include-stacktrace: on_param
